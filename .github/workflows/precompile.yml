name: precompile

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  DUCKDBEX_VERSION: "0.4.0-prokeep.2"
  DUCKDB_VERSION: "1.5.1"

jobs:
  linux:
    name: Linux GNU Erlang/OTP 28.2 - Elixir 1.19.5
    runs-on: ubuntu-22.04
    env:
      MIX_ENV: "prod"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28.2"
          elixir-version: "1.19.5"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential automake autoconf pkg-config bc m4 unzip zip \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            gcc-riscv64-linux-gnu g++-riscv64-linux-gnu \
            libstdc++-10-dev erlang-dev ccache

      - name: Setup Mix
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Cache mix deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            ~/.cache/duckdbex-nif-*
          key: linux-gnu-mix-otp-28.2-elixir-1.19.5-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            linux-gnu-mix-otp-28.2-elixir-1.19.5-

      - name: Get Dependencies
        run: |
          export ELIXIR_MAKE_FORCE_BUILD=1
          mix deps.get

      - name: Create precompiled library
        run: |
          export ELIXIR_MAKE_CACHE_DIR=$(pwd)/cache
          mkdir -p "${ELIXIR_MAKE_CACHE_DIR}"
          export CC="ccache gcc"
          export CXX="ccache g++"
          export CXXFLAGS="-D_GNU_SOURCE -std=c++11"
          export MAKEFLAGS="-j$(nproc)"
          mix elixir_make.precompile
          ls -lh cache/*.tar.gz

      - name: Mix Test
        run: |
          export ELIXIR_MAKE_FORCE_BUILD=1
          MIX_ENV=test mix test

      - uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            cache/*.tar.gz
            cache/*.tar.gz

  linux-musl:
    name: Alpine musl x86_64 - elixir:1.19.5-otp-28-alpine
    runs-on: ubuntu-22.04
    container:
      image: elixir:1.19.5-otp-28-alpine
    env:
      MIX_ENV: "prod"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apk add --no-cache alpine-sdk git ccache

      - name: Setup Mix
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Pre-compile NIF library
        run: |
          echo "Target info:"
          uname -m
          elixir -e 'IO.inspect(:erlang.system_info(:system_architecture))'
          elixir -e 'IO.inspect(:erlang.system_info(:nif_version))'

          export ELIXIR_MAKE_CACHE_DIR=$(pwd)/cache
          mkdir -p "${ELIXIR_MAKE_CACHE_DIR}"
          export ELIXIR_MAKE_FORCE_BUILD=1
          export CC="ccache gcc"
          export CXX="ccache g++"
          export CXXFLAGS="-D_GNU_SOURCE -std=c++11"
          export MAKEFLAGS="-j$(nproc)"

          mix deps.get
          mix elixir_make.precompile

          ls -lh cache/*.tar.gz

      - name: Mix Test
        run: |
          export ELIXIR_MAKE_FORCE_BUILD=1
          MIX_ENV=test mix test

      - uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            cache/*.tar.gz

  macos:
    runs-on: macos-14
    env:
      MIX_ENV: prod
      CC_PRECOMPILER_PRECOMPILE_ONLY_LOCAL: "true"
    strategy:
      matrix:
        arch:
          - x86_64-apple-darwin
          - arm64-apple-darwin
        job:
          - {otp: "28.2", elixir: "1.19.5"}

    name: Mac ${{ matrix.arch }} - OTP 28.2 - Elixir 1.19.5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install asdf
        uses: asdf-vm/actions/setup@v4

      - name: Cache asdf
        id: asdf-cache
        uses: actions/cache@v4
        with:
          path: ~/.asdf
          key: asdf-${{ runner.os }}-build-${{ matrix.job.otp }}-${{ matrix.job.elixir }}

      - if: ${{ steps.asdf-cache.outputs.cache-hit != 'true' }}
        name: Install Erlang & Elixir
        env:
          ELIXIR_VERSION: ${{ matrix.job.elixir }}
          OTP_VERSION: ${{ matrix.job.otp }}
        run: |
          asdf plugin add erlang
          asdf install erlang ${OTP_VERSION}

          ELIXIR_OTP_VERSION=$(echo $OTP_VERSION | cut -d. -f1)
          asdf plugin add elixir
          asdf install elixir ${ELIXIR_VERSION}-otp-${ELIXIR_OTP_VERSION}

      - name: Setup Erlang & Elixir
        env:
          ELIXIR_VERSION: ${{ matrix.job.elixir }}
          OTP_VERSION: ${{ matrix.job.otp }}
        run: |
          asdf set erlang ${OTP_VERSION}
          ELIXIR_OTP_VERSION=$(echo $OTP_VERSION | cut -d. -f1)
          asdf set elixir ${ELIXIR_VERSION}-otp-${ELIXIR_OTP_VERSION}

      - name: Install libomp and ccache
        run: |
          brew install libomp ccache
          echo "$(brew --prefix)/bin" >> $GITHUB_PATH

      - name: Install hex & rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Patch source code
        run: |
          echo '#include <cmath>' > temp_header.hpp
          echo '#include <math.h>' >> temp_header.hpp
          cat temp_header.hpp c_src/value_to_term.cpp > value_to_term_new.cpp
          mv value_to_term_new.cpp c_src/value_to_term.cpp

      - name: Pre-compile NIF library
        run: |
          export ELIXIR_MAKE_CACHE_DIR=$(pwd)/cache
          mkdir -p "${ELIXIR_MAKE_CACHE_DIR}"
          mix deps.get
          export CC="ccache clang"
          export CXX="ccache clang++"
          export CXXFLAGS="-std=c++11"
          export MAKEFLAGS="-j$(sysctl -n hw.ncpu)"
          mix elixir_make.precompile

      - name: Mix Test
        run: |
          MIX_ENV=test mix test

      - uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            cache/*.tar.gz
