name: precompile

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  DUCKDB_VERSION: "1.5.1"

jobs:
  linux-musl:
    name: Alpine musl x86_64 - elixir:1.19.5-otp-28-alpine
    runs-on: ubuntu-22.04
    container:
      image: elixir:1.19.5-otp-28-alpine
    env:
      MIX_ENV: "prod"
      CC_PRECOMPILER_PRECOMPILE_ONLY_LOCAL: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apk add --no-cache alpine-sdk git ccache python3

      - name: Setup Mix
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Pre-compile NIF library
        run: |
          echo "Target info:"
          uname -m
          elixir -e 'IO.inspect(:erlang.system_info(:system_architecture), label: "system_architecture")'
          elixir -e 'IO.inspect(:erlang.system_info(:nif_version), label: "nif_version")'

          export ELIXIR_MAKE_CACHE_DIR=$(pwd)/cache
          mkdir -p "${ELIXIR_MAKE_CACHE_DIR}"
          export ELIXIR_MAKE_FORCE_BUILD=1
          export CC="ccache gcc"
          export CXX="ccache g++"
          export CXXFLAGS="-D_GNU_SOURCE -std=c++11 -Wno-deprecated-declarations"
          export MAKEFLAGS="-j$(nproc)"

          mix deps.get
          mix elixir_make.precompile

          ls -lh cache/*.tar.gz

      - name: Refresh checksum.exs with local builds
        run: |
          python3 - <<'PY'
          import hashlib, re
          from pathlib import Path

          cf = Path("checksum.exs")
          checksums = {}
          if cf.exists():
              for m in re.finditer(r'"([^"]+)"\s*=>\s*"sha256:([a-f0-9]+)"', cf.read_text()):
                  checksums[m.group(1)] = m.group(2)
          for p in sorted(Path("cache").glob("*.tar.gz")):
              checksums[p.name] = hashlib.sha256(p.read_bytes()).hexdigest()
          lines = ["%{"] + [f'  "{n}" => "sha256:{d}",' for n, d in sorted(checksums.items())] + ["}"]
          cf.write_text("\n".join(lines) + "\n")
          print(f"checksum.exs: {len(checksums)} entries")
          PY

      - name: Mix Test
        run: |
          export ELIXIR_MAKE_CACHE_DIR=$(pwd)/cache
          MIX_ENV=test mix test

      - name: Upload precompiled NIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-musl-nif
          path: cache/*.tar.gz

  linux-gnu-aarch64:
    name: Ubuntu glibc aarch64 - elixir:1.19.5-otp-28
    runs-on: ubuntu-22.04-arm
    container:
      image: elixir:1.19.5-otp-28
    env:
      MIX_ENV: "prod"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends build-essential git ccache ca-certificates

      - name: Setup Mix
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Pre-compile NIF library
        run: |
          echo "Target info:"
          uname -m
          ldd --version | head -1
          elixir -e 'IO.inspect(:erlang.system_info(:system_architecture), label: "system_architecture")'
          elixir -e 'IO.inspect(:erlang.system_info(:nif_version), label: "nif_version")'

          export ELIXIR_MAKE_CACHE_DIR=$(pwd)/cache
          mkdir -p "${ELIXIR_MAKE_CACHE_DIR}"
          export ELIXIR_MAKE_FORCE_BUILD=1
          export CC="ccache gcc"
          export CXX="ccache g++"
          export CXXFLAGS="-D_GNU_SOURCE -std=c++11 -Wno-deprecated-declarations"
          export MAKEFLAGS="-j$(nproc)"

          mix deps.get
          mix elixir_make.precompile

          ls -lh cache/*.tar.gz

      - name: Refresh checksum.exs with local builds
        run: |
          python3 - <<'PY'
          import hashlib, re
          from pathlib import Path

          cf = Path("checksum.exs")
          checksums = {}
          if cf.exists():
              for m in re.finditer(r'"([^"]+)"\s*=>\s*"sha256:([a-f0-9]+)"', cf.read_text()):
                  checksums[m.group(1)] = m.group(2)
          for p in sorted(Path("cache").glob("*.tar.gz")):
              checksums[p.name] = hashlib.sha256(p.read_bytes()).hexdigest()
          lines = ["%{"] + [f'  "{n}" => "sha256:{d}",' for n, d in sorted(checksums.items())] + ["}"]
          cf.write_text("\n".join(lines) + "\n")
          print(f"checksum.exs: {len(checksums)} entries")
          PY

      - name: Mix Test
        run: |
          export ELIXIR_MAKE_CACHE_DIR=$(pwd)/cache
          MIX_ENV=test mix test

      - name: Upload precompiled NIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-gnu-aarch64-nif
          path: cache/*.tar.gz

  macos:
    runs-on: macos-14
    env:
      MIX_ENV: prod
      CC_PRECOMPILER_PRECOMPILE_ONLY_LOCAL: "true"
    strategy:
      matrix:
        arch:
          - x86_64-apple-darwin
          - arm64-apple-darwin
        job:
          - {otp: "28.2", elixir: "1.19.5"}

    name: Mac ${{ matrix.arch }} - OTP 28.2 - Elixir 1.19.5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install asdf
        uses: asdf-vm/actions/setup@v4

      - name: Cache asdf
        id: asdf-cache
        uses: actions/cache@v4
        with:
          path: ~/.asdf
          key: asdf-${{ runner.os }}-build-${{ matrix.job.otp }}-${{ matrix.job.elixir }}

      - if: ${{ steps.asdf-cache.outputs.cache-hit != 'true' }}
        name: Install Erlang & Elixir
        env:
          ELIXIR_VERSION: ${{ matrix.job.elixir }}
          OTP_VERSION: ${{ matrix.job.otp }}
        run: |
          asdf plugin add erlang
          asdf install erlang ${OTP_VERSION}

          ELIXIR_OTP_VERSION=$(echo $OTP_VERSION | cut -d. -f1)
          asdf plugin add elixir
          asdf install elixir ${ELIXIR_VERSION}-otp-${ELIXIR_OTP_VERSION}

      - name: Setup Erlang & Elixir
        env:
          ELIXIR_VERSION: ${{ matrix.job.elixir }}
          OTP_VERSION: ${{ matrix.job.otp }}
        run: |
          asdf set erlang ${OTP_VERSION}
          ELIXIR_OTP_VERSION=$(echo $OTP_VERSION | cut -d. -f1)
          asdf set elixir ${ELIXIR_VERSION}-otp-${ELIXIR_OTP_VERSION}

      - name: Install libomp and ccache
        run: |
          brew install libomp ccache
          echo "$(brew --prefix)/bin" >> $GITHUB_PATH

      - name: Install hex & rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Patch source code
        run: |
          echo '#include <cmath>' > temp_header.hpp
          echo '#include <math.h>' >> temp_header.hpp
          cat temp_header.hpp c_src/value_to_term.cpp > value_to_term_new.cpp
          mv value_to_term_new.cpp c_src/value_to_term.cpp

      - name: Pre-compile NIF library
        run: |
          export ELIXIR_MAKE_CACHE_DIR=$(pwd)/cache
          mkdir -p "${ELIXIR_MAKE_CACHE_DIR}"
          mix deps.get
          export CC="ccache clang"
          export CXX="ccache clang++"
          export CXXFLAGS="-std=c++11 -Wno-deprecated-declarations"
          export MAKEFLAGS="-j$(sysctl -n hw.ncpu)"
          mix elixir_make.precompile

          ls -lh cache/*.tar.gz

      - name: Mix Test
        run: |
          MIX_ENV=test mix test

      - name: Upload precompiled NIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-nif
          path: cache/*.tar.gz

  finalize-release:
    name: Generate checksums, tag, and publish release
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main'
    needs:
      - linux-musl
      - linux-gnu-aarch64
      - macos
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          token: ${{ github.token }}

      - name: Download built NIF artifacts
        uses: actions/download-artifact@v4
        with:
          path: precompiled-assets
          merge-multiple: true

      - name: Extract version from mix.exs
        run: |
          VERSION=$(sed -n 's/^  @version "\(.*\)"/\1/p' mix.exs)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Releasing version: $VERSION"

      - name: Verify artifacts
        run: |
          echo "Artifacts:"
          find precompiled-assets -name '*.tar.gz' -maxdepth 2 -print -exec shasum -a 256 {} \;

          test -f "precompiled-assets/duckdbex-nif-2.17-x86_64-linux-musl-${VERSION}.tar.gz"
          test -f "precompiled-assets/duckdbex-nif-2.17-aarch64-linux-gnu-${VERSION}.tar.gz"

      - name: Generate checksum.exs
        run: |
          python3 - <<'PY'
          import hashlib
          from pathlib import Path

          files = sorted(Path("precompiled-assets").glob("*.tar.gz"))

          if not files:
              raise SystemExit("No .tar.gz artifacts found")

          seen = set()
          lines = ["%{"]

          for path in files:
              if path.name in seen:
                  continue

              seen.add(path.name)
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              lines.append(f'  "{path.name}" => "sha256:{digest}",')

          lines.append("}")
          Path("checksum.exs").write_text("\n".join(lines) + "\n")
          PY

          cat checksum.exs
          grep 'linux-musl' checksum.exs

      - name: Commit checksum.exs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f checksum.exs
          git commit -m "Add precompiled NIF checksums for ${VERSION}"

          git push origin HEAD:${{ github.ref_name }}

      - name: Tag checksum commit
        run: |
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "Precompiled NIF artifacts for v${VERSION}" \
            precompiled-assets/*.tar.gz
